name: CI

# ─── Déclencheur du workflow ───────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─── Lint Backend ────────────────────────────────────────────────────
  lint-backend:
    name: Backend - Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # Récupère le code du dépôt GitHub dans l'environnement CI.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: blablabook/backend/package-lock.json
          # Installe Node.js 22 et configure la cache npm pour accélérer les installations.

      - name: Install dependencies
        working-directory: blablabook/backend
        run: npm ci
        # Installe les dépendances exactes définies dans package-lock.json pour garantir la cohérence.

      - name: Generate Prisma client
        working-directory: blablabook/backend
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/db
        run: npx prisma generate
        # Génère le client Prisma pour interagir avec la base de données.
        # La variable DATABASE_URL est est un placeholder (ne sera pas utilisée ici, car ce job ne teste pas la base de données).

      - name: Lint
        working-directory: blablabook/backend
        run: npm run lint
        # Exécute le script de linting pour vérifier la qualité du code et les erreurs de style.

  # ─── Tests Backend ───────────────────────────────────────────────────
  test-backend:
    name: Backend - Tests & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: blablabook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Lance un container PostgreSQL pour les tests, avec vérification de santé (pg_isready) pour s'assurer que la base de données est prête avant de continuer.

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/blablabook_test
      JWT_SECRET: ci-secret-key-minimum-32-characters-long-for-testing
      JWT_EXPIRES_IN: 1h
      PORT: 3000
      ALLOWED_ORIGINS: "*"
      NODE_ENV: test
    # Définit les variables d'environnement pour les tests (connexion à la BDD, secrets, etc.).

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # Récupère le code.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: blablabook/backend/package-lock.json
        # Installe Node.js et utilise le cache npm.

      - name: Install dependencies
        working-directory: blablabook/backend
        run: npm ci
        # Installe les dépendances.

      - name: Generate Prisma client
        working-directory: blablabook/backend
        run: npx prisma generate
        # Génère le client Prisma.

      - name: Apply database migrations
        working-directory: blablabook/backend
        run: npx prisma migrate deploy
        # Applique les migrations Prisma pour créer les tables nécessaires dans la base de test.

      - name: Run tests
        working-directory: blablabook/backend
        run: npm test
        # Exécute les tests unitaires et d'intégration.

      - name: Generate coverage report
        working-directory: blablabook/backend
        run: npm run test:coverage
        # Génère un rapport de couverture de code.
        # Ce rapport est généralement stocké dans un fichier comme `coverage/lcov.info`.

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./blablabook/backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false
        # Envoie le rapport de couverture à Codecov.
        # - `if: always()` : Exécute cette étape même si les étapes précédentes échouent.
        # - `files` : Chemin vers le fichier de couverture (format LCOV).
        # - `flags` : Étiquette pour identifier la source des données (ex : "backend").
        # - `fail_ci_if_error: false` : Ne fait pas échouer le workflow si Codecov rencontre une erreur.

  # ─── Build Backend ───────────────────────────────────────────────────
  build-backend:
    name: Backend - Build
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend]
    # Ce job dépend de la réussite de `lint-backend` et `test-backend` pour s'assurer que le code est propre et que les tests passent avant de tenter de construire l'application.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: blablabook/backend/package-lock.json

      - name: Install dependencies
        working-directory: blablabook/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: blablabook/backend
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/db
        run: npx prisma generate

      - name: Build (TypeScript)
        working-directory: blablabook/backend
        run: npm run build
        # Compile le code TypeScript en JavaScript.

  # ─── Lint Frontend ──────────────────────────────────────────────────
  lint-frontend:
    name: Frontend - Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: blablabook/frontend/package-lock.json

      - name: Install dependencies
        working-directory: blablabook/frontend
        run: npm ci

      - name: Lint
        working-directory: blablabook/frontend
        run: npm run lint
        # Exécute le script de linting pour le frontend (Next.js).

  # ─── Tests Frontend ─────────────────────────────────────────────────
  test-frontend:
    name: Frontend - Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: blablabook/frontend/package-lock.json

      - name: Install dependencies
        working-directory: blablabook/frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: blablabook/frontend
        run: npm run test:coverage

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./blablabook/frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  # ─── Build Frontend ──────────────────────────────────────────────────
  build-frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-frontend]
    # Dépend de la réussite de `lint-frontend` et `test-frontend`.

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      # Définit une variable d'environnement pour le build (URL de l'API backend).

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: blablabook/frontend/package-lock.json

      - name: Install dependencies
        working-directory: blablabook/frontend
        run: npm ci

      - name: Build (Next.js)
        working-directory: blablabook/frontend
        run: npm run build
        # Construit l'application Next.js pour la production.
